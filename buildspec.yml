version: 0.2
env:
  variables:
    ECR_REPO_NAME: justinb-cicdpipeline-dockerimage
phases:
  pre_build:
    commands:
      - ECR_MAIN_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
      - aws ecr get-login-password --region ${AWS_REGION} | podman login -u AWS --password-stdin ${ECR_MAIN_URI}
      - ECR_IMAGE_URI="${ECR_MAIN_URI}/${ECR_REPO_NAME}:latest"
  build:
    commands:
      - podman build -t justinb-cicdpipeline-dockerimage:latest .
  post_build:
    commands:
      - podman tag justinb-cicdpipeline-dockerimage:latest ${ECR_IMAGE_URI}
      - podman push ${ECR_IMAGE_URI}